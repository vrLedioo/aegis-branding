<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MedLink — Web Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; padding:0; background:#05080F; color:#C8E8F0; font-family:'Inter',system-ui,sans-serif; min-height:100vh;}
  #root { min-height:100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="showcase-carousel.jsx"></script>
<script type="text/babel" src="medlink-screens.jsx"></script>
<script type="text/babel" data-presets="react">
function Win({ url, children }) {
  return <ChromeWindow url={url} tabs={[{title:'MedLink — AEGIS Trek'}]} width={1440} height={900}>{children}</ChromeWindow>;
}
function App() {
  const screens = [
    { label: "01 · Overview", component: <Win url="medlink.aegistrek.com/overview"><MLScreen1Overview/></Win> },
    { label: "02 · Patient Roster", component: <Win url="medlink.aegistrek.com/patients"><MLScreen2Patients/></Win> },
    { label: "03 · Patient Detail · Critical", component: <Win url="medlink.aegistrek.com/patients/AGX-J-0412"><MLScreen3Detail/></Win> },
    { label: "04 · Drone Fleet", component: <Win url="medlink.aegistrek.com/drones"><MLScreen4Fleet/></Win> },
    { label: "05 · Incident Report", component: <Win url="medlink.aegistrek.com/incidents/2026-0918-0412"><MLScreen5Report/></Win> }
  ];

  return (
    <ShowcaseCarousel 
      title="MedLink — Web Dashboard"
      subtitle="AEGIS Trek · Deliverable 05 · 1440 × 900"
      screens={screens}
      isMobile={false}
    />
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
