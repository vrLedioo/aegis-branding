<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ghost Trail — Mobile Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#05080F; color:#C8E8F0; font-family:'Inter',system-ui,sans-serif; min-height:100vh; }
  #root { min-height: 100vh; }
  @keyframes gtPulse { 0% { transform:scale(1); opacity:0.7;} 100% { transform:scale(2); opacity:0;} }
  .gt-strobe { animation: gtStrobe 0.8s steps(2,end) infinite; }
  @keyframes gtStrobe { 0%,100% { opacity:1;} 50%{opacity:0.25;} }
  @media (prefers-reduced-motion: reduce) { .gt-strobe { animation:none;} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="showcase-carousel.jsx"></script>
<script type="text/babel" src="ghost-trail-screens.jsx"></script>

<script type="text/babel" data-presets="react">
function Device({ children }) {
  return <IOSDevice dark={true}>{children}</IOSDevice>;
}

function App() {
  const screens = [
    { label: "01 · On-Trail Companion", component: <Device><GTScreen1Companion/></Device> },
    { label: "02 · Critical Alert · Drone Dispatch", component: <Device><GTScreen2Alert/></Device> },
    { label: "03 · Map · Drone Approach", component: <Device><GTScreen3Map/></Device> },
    { label: "04 · Pair Jacket · BLE", component: <Device><GTScreen4Pair/></Device> },
    { label: "05 · Trip Summary", component: <Device><GTScreen5Summary/></Device> }
  ];

  return (
    <ShowcaseCarousel 
      title="Ghost Trail — 5 Key Screens"
      subtitle="AEGIS Trek · Deliverable 04 · iOS 26"
      screens={screens}
      isMobile={true}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
